name: KG Build — Extract Knowledge Graph
on:
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'ontology/**'
      - 'tools/**'
      - 'tests/**'
  workflow_dispatch:

permissions:
  contents: write
  models: read

jobs:
  build-graph:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.11'
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short

      - name: Build knowledge graph
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LLM_MODEL: openai/gpt-4o-mini
        run: uv run python -m tools.kg_build --repo-root . --base-url https://example.com

      - name: Copy graph data into API package
        run: |
          mkdir -p api/data
          cp graph/articles/*.ttl api/data/ 2>/dev/null || echo "No TTL files to copy"

      - name: Check for changes
        id: changes
        run: |
          git add graph/ api/data/
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit graph artifacts
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add graph/ api/data/
          git commit -m "chore: update knowledge graph [skip ci]"
          git push
